<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/site/about-hero.svg">
  <link rel="stylesheet" href="styles/style.css">

  <title>Selah - Home</title>
</head>
<body>
  <main>
    <div class="home-link">
      <a href="index.html" class="home">
        <div class="container">
          <img src="assets/site/selah-logo.svg" alt="Selah logo">
          <span>Psalms and Meditations</span>
        </div>
      </a>
    </div>
    <div class="section hero">
      <div class="container">
        <img src="assets/site/selah-hero.svg" alt="Selah Hero">
        <div class="divider">EXPLORE</div>
      </div>
    </div>
    
    <div class="grid">
        <div class="container">
        </div>
    </div>

    <div class="footer section">
        <a href="https://www.kalebfarar.com">
          <img src="assets/site/circa-logo.svg" alt="Circa logo">
        </a>
        <div class="divider">© CIRCA TEXA</div>

  <script>
    const psalmOrder = [55, 73, 81, 103, 25, 31, 50, 131, 1, 115, 30, 127, 2, 9, 20, 136, 147, 150, 74, 77, 71, 66, 43, 78, 67, 63, 114, 101, 42, 34, 121, 15, 125, 23, 134, 145, 148, 80, 69, 75, 76, 83, 72, 68, 85, 62, 52, 91, 99, 40, 33, 117, 122, 128, 21, 135, 60, 82, 72, 79, 65, 84, 58, 41, 124, 133, 95, 49, 47, 104, 113, 24, 19, 138, 102, 90, 64, 56, 35, 14, 87, 107, 126, 11, 139, 53, 32, 149, 46, 111, 37, 8, 146, 38, 51, 88, 109, 120, 140, 27, 94, 116, 26, 110, 59, 96, 112, 108, 48, 45, 29, 18, 130, 22, 44, 28, 12, 141, 129, 36, 10, 5, 17, 86, 57, 4, 7, 56, 97, 100, 105, 143, 137, 123, 54, 89, 61, 92, 144, 6, 142, 16, 39, 106, 98, 132, 3]
    const container = document.querySelector('.grid .container');
    let index = 0;

    for (let row = 0; row < 9; row ++) {
        const rowElement = document.createElement('div');
        rowElement.className = 'psalm-row';
        for (let column = 0; column < 19; column++) {
            const psalm = psalmOrder[index++];
            const a = document.createElement('a');
            a.href = `psalm-${psalm}.html`;
            a.className = 'psalm-link';
            rowElement.appendChild(a);
        }
        container.appendChild(rowElement);
    }

  </script>
</body>
</html>
